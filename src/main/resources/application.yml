spring:
  application:
    name: fundamentos01
  profiles:
    active: dev
  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  expiration: 1800000
  refresh-expiration: 604800000
  issuer: fundamentos01-api
  header: Authorization
  prefix: "Bearer "
