spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never

logging:
  level:
    root: WARN
    ec.edu.ups.icc.fundamentos01: INFO
  file:
    name: /var/log/fundamentos01/application.log
    max-size: 10MB
    max-history: 30

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000}
